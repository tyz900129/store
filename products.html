<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop · PawPatrol</title>
  <meta name="description" content="Browse the full PawPatrol collection. Filter by category, pet, and price.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231F1A14'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='%23FAF6EE' font-family='serif' font-size='62' font-weight='700'%3EP%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/store/assets/css/base.css">
  <link rel="stylesheet" href="/store/assets/css/layout.css">
  <link rel="stylesheet" href="/store/assets/css/components.css">
  <link rel="stylesheet" href="/store/assets/css/pages.css">
</head>
<body data-page="list">
  <header id="site-header" class="site-header"></header>

  <section class="page-title">
    <div class="container">
      <div class="crumbs">
        <a href="/store/">Home</a><span>/</span><span>Shop</span>
      </div>
      <h1 id="listTitle">All Products</h1>
      <p>Handcrafted pieces, designed for the way you and your pet actually live.</p>
    </div>
  </section>

  <main class="section">
    <div class="container">
      <div class="list-page">
        <aside class="filter-panel">
          <input type="text" id="searchInput" placeholder="Search products…" style="width:100%;padding:10px 14px;border:1.5px solid var(--c-line);border-radius:999px;outline:none;margin-bottom:8px;">
          <h4>Pet</h4>
          <div id="petFilters"></div>
          <h4>Category</h4>
          <div id="catFilters"></div>
          <h4>Price</h4>
          <div>
            <input type="range" id="priceRange" min="0" max="200" value="200" style="width:100%;">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--c-ink-3);">
              <span>$0</span><span>Up to <strong id="priceVal">$200</strong></span>
            </div>
          </div>
        </aside>

        <div>
          <div class="list-toolbar">
            <span class="count-text" id="countText">Loading…</span>
            <select id="sortSelect">
              <option value="popular">Most popular</option>
              <option value="new">Newest</option>
              <option value="rating">Top rated</option>
              <option value="price-asc">Price: low to high</option>
              <option value="price-desc">Price: high to low</option>
            </select>
          </div>
          <div class="product-grid" id="productGrid"></div>
        </div>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script type="module" src="/store/assets/js/main.v5.js"></script>
  <script type="module" src="/store/assets/js/pages/list.v5.js"></script>
</body>
</html>
