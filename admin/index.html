<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawPatrol 管理后台</title>
<style>
:root{--primary:#2c3e50;--accent:#e67e22;--bg:#f5f6fa;--card:#fff;--border:#e1e4e8;--text:#333;--muted:#666;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;height:100vh}
aside{width:220px;background:var(--primary);color:#fff;display:flex;flex-direction:column}
.brand{padding:20px;font-size:16px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1)}
nav{flex:1;padding:12px 0}
nav a{display:block;padding:12px 20px;color:#cbd5e1;text-decoration:none;font-size:14px;border-left:3px solid transparent}
nav a:hover,nav a.active{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--accent)}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
header{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.user{font-size:13px;color:var(--muted)}
.content{flex:1;padding:24px;overflow:auto}
.section{display:none}
.section.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);padding:18px;border-radius:10px;border:1px solid var(--border)}
.card h3{margin:0;font-size:24px;color:var(--primary)}
.card p{margin:6px 0 0;font-size:13px;color:var(--muted)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
th{background:#fafbfc;font-weight:600;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
tr:hover{background:#fafbfc}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge.pending{background:#fff3cd;color:#856404}
.badge.paid{background:#d4edda;color:#155724}
.badge.shipped{background:#cce5ff;color:#004085}
.badge.done{background:#d1ecf1;color:#0c5460}
.badge.refund{background:#f8d7da;color:#721c24}
.btn{padding:6px 12px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:12px;cursor:pointer}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.danger{background:#c0392b;color:#fff;border-color:#c0392b}
.btn.sm{padding:4px 10px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;justify-content:space-between}
.toolbar h2{margin:0;font-size:18px}
.paginate{display:flex;gap:6px;justify-content:center;margin-top:12px}
.paginate button{padding:6px 12px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:12px;cursor:pointer}
.paginate button:disabled{opacity:.5;cursor:not-allowed}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-box{background:var(--card);width:90%;max-width:560px;border-radius:12px;padding:24px;max-height:90vh;overflow:auto}
.modal-box h3{margin:0 0 16px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-row .field{flex:1}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.field textarea{min-height:80px;resize:vertical}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.trend{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:24px}
.trend h4{margin:0 0 12px;font-size:14px}
.chart{display:flex;align-items:flex-end;gap:8px;height:140px}
.bar{flex:1;background:var(--primary);border-radius:4px 4px 0 0;opacity:.8;transition:.2s;position:relative;min-width:24px}
.bar:hover{opacity:1}
.bar span{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);white-space:nowrap}
.bar i{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);font-style:normal}
</style>
</head>
<body>
<div class="app">
<aside>
  <div class="brand">PawPatrol Store</div>
  <nav>
    <a href="#" class="active" data-page="dashboard">仪表盘</a>
    <a href="#" data-page="products">商品管理</a>
    <a href="#" data-page="orders">订单管理</a>
    <a href="#" data-page="subscribers">订阅用户</a>
  </nav>
</aside>
<main>
  <header>
    <div style="font-weight:600">管理后台</div>
    <div class="user">
      <span id="uname"></span> · <a href="#" id="logout" style="color:var(--accent);text-decoration:none">退出</a>
    </div>
  </header>
  <div class="content">
    <!-- Dashboard -->
    <div class="section active" id="dashboard">
      <div class="cards">
        <div class="card"><h3 id="d-products">0</h3><p>商品总数</p></div>
        <div class="card"><h3 id="d-orders">0</h3><p>订单总数</p></div>
        <div class="card"><h3 id="d-subscribers">0</h3><p>订阅用户</p></div>
        <div class="card"><h3 id="d-revenue">$0</h3><p>总营收</p></div>
      </div>
      <div class="trend"><h4>最近7天订单趋势</h4><div class="chart" id="trendChart"></div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>订单号</th><th>邮箱</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
          <tbody id="recentOrders"></tbody>
        </table>
      </div>
    </div>

    <!-- Products -->
    <div class="section" id="products">
      <div class="toolbar">
        <h2>商品管理</h2>
        <button class="btn primary" id="btnNewProduct" style="display:none">+ 新增商品</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>名称</th><th>分类</th><th>价格</th><th>库存</th><th>状态</th><th>操作</th></tr>
          </thead>
          <tbody id="productList"></tbody>
        </table>
      </div>
      <div class="paginate" id="productPag"></div>
    </div>

    <!-- Orders -->
    <div class="section" id="orders">
      <div class="toolbar">
        <h2>订单管理</h2>
        <select id="orderStatus" class="btn">
          <option value="">全部状态</option>
          <option value="pending">待处理</option>
          <option value="paid">已付款</option>
          <option value="shipped">已发货</option>
          <option value="done">已完成</option>
          <option value="refund">退款</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>订单号</th><th>邮箱</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th></tr>
          </thead>
          <tbody id="orderList"></tbody>
        </table>
      </div>
      <div class="paginate" id="orderPag"></div>
    </div>

    <!-- Subscribers -->
    <div class="section" id="subscribers">
      <div class="toolbar"><h2>订阅用户</h2></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>邮箱</th><th>订阅时间</th></tr></thead>
          <tbody id="subList"></tbody>
        </table>
      </div>
      <div class="paginate" id="subPag"></div>
    </div>
  </div>
</main>
</div>

<!-- Product Modal -->
<div class="modal" id="productModal">
  <div class="modal-box">
    <h3 id="pmTitle">编辑商品</h3>
    <div class="form-row">
      <div class="field"><label>名称</label><input type="text" id="p-title"></div>
      <div class="field"><label>Slug</label><input type="text" id="p-slug"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>价格</label><input type="number" step="0.01" id="p-price"></div>
      <div class="field"><label>原价</label><input type="number" step="0.01" id="p-original"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>分类</label>
        <select id="p-category">
          <option value="bed">Beds & Caves</option>
          <option value="toy">Toys</option>
          <option value="apparel">Apparel</option>
          <option value="bowl">Bowls & Diners</option>
          <option value="travel">Travel & Walk</option>
          <option value="smart">Smart Gear</option>
        </select>
      </div>
      <div class="field"><label>适用宠物</label>
        <select id="p-pet">
          <option value="all">全部</option>
          <option value="cat">猫</option>
          <option value="dog">狗</option>
          <option value="small">小宠</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field"><label>库存</label><input type="number" id="p-stock"></div>
      <div class="field"><label>状态</label>
        <select id="p-status">
          <option value="active">上架</option>
          <option value="inactive">下架</option>
          <option value="soldout">售罄</option>
        </select>
      </div>
    </div>
    <div class="field"><label>描述</label><textarea id="p-desc"></textarea></div>
    <div class="field"><label>图片 JSON</label><input type="text" id="p-images" placeholder='["url1","url2"]'></div>
    <div class="actions">
      <button class="btn" onclick="closeModal('productModal')">取消</button>
      <button class="btn primary" id="btnSaveProduct">保存</button>
    </div>
  </div>
</div>

<!-- Order Modal -->
<div class="modal" id="orderModal">
  <div class="modal-box">
    <h3>订单详情</h3>
    <div id="orderDetail" style="font-size:13px;line-height:1.8"></div>
    <div class="actions">
      <button class="btn" onclick="closeModal('orderModal')">关闭</button>
    </div>
  </div>
</div>

<script>
const API = '../api/admin/';
let userRole = '';
let pages = {products:1, orders:1, subscribers:1};
let editingProductId = null;

async function api(url, opts={}) {
  const res = await fetch(API + url, opts);
  if (res.status === 401) { location.href='login.html'; return {}; }
  return res.json();
}

async function init() {
  const s = await api('session.jsp');
  if (s.code !== 0) return location.href='login.html';
  userRole = s.user.role;
  document.getElementById('uname').textContent = s.user.name || s.user.username;
  if (userRole === 'admin') document.getElementById('btnNewProduct').style.display='inline-block';
  loadDashboard();
}

// Navigation
document.querySelectorAll('nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
    const page = a.dataset.page;
    document.getElementById(page).classList.add('active');
    if (page === 'products') loadProducts();
    if (page === 'orders') loadOrders();
    if (page === 'subscribers') loadSubscribers();
  });
});

async function loadDashboard() {
  const d = await api('dashboard.jsp');
  if (d.code !== 0) return;
  document.getElementById('d-products').textContent = d.data.products;
  document.getElementById('d-orders').textContent = d.data.orders;
  document.getElementById('d-subscribers').textContent = d.data.subscribers;
  document.getElementById('d-revenue').textContent = '$' + Number(d.data.revenue).toFixed(2);

  // trend chart
  const chart = document.getElementById('trendChart');
  chart.innerHTML = '';
  const max = Math.max(1, ...d.data.trend.map(t => t.count));
  d.data.trend.forEach(t => {
    const h = Math.round((t.count / max) * 100);
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = h + '%';
    bar.innerHTML = `<i>${t.count}</i><span>${t.date.slice(5)}</span>`;
    chart.appendChild(bar);
  });

  const ro = document.getElementById('recentOrders');
  ro.innerHTML = d.data.recentOrders.map(o => `<tr>
    <td>${o.id}</td><td>${o.email}</td><td>$${o.total}</td>
    <td><span class="badge ${o.status}">${o.status}</span></td>
    <td>${o.created_at}</td>
  </tr>`).join('') || '<tr><td colspan="5" class="empty">暂无订单</td></tr>';
}

// Products
async function loadProducts(page=1) {
  pages.products = page;
  const d = await api(`products.jsp?page=${page}&size=10`);
  if (d.code !== 0) return;
  const tbody = document.getElementById('productList');
  tbody.innerHTML = d.data.items.map(p => `<tr>
    <td>${p.id}</td><td>${p.title}</td><td>${p.category||'-'}</td><td>$${p.price}</td><td>${p.stock}</td>
    <td><span class="badge ${p.status}">${p.status}</span></td>
    <td>
      <button class="btn sm" onclick="editProduct(${p.id})">编辑</button>
      ${userRole==='admin' ? `<button class="btn sm danger" onclick="delProduct(${p.id})">删除</button>` : ''}
    </td>
  </tr>`).join('') || '<tr><td colspan="7" class="empty">暂无商品</td></tr>';
  renderPag('productPag', d.data.total, 10, pages.products, loadProducts);
}
async function editProduct(id) {
  const d = await api(`products.jsp?id=${id}`);
  if (d.code !== 0) return alert('加载失败');
  const p = d.data;
  editingProductId = p.id;
  document.getElementById('pmTitle').textContent = '编辑商品';
  document.getElementById('p-title').value = p.title;
  document.getElementById('p-slug').value = p.slug || '';
  document.getElementById('p-price').value = p.price;
  document.getElementById('p-original').value = p.original_price || '';
  document.getElementById('p-category').value = p.category_id || 'bed';
  document.getElementById('p-pet').value = p.pet || 'all';
  document.getElementById('p-stock').value = p.stock;
  document.getElementById('p-status').value = p.status;
  document.getElementById('p-desc').value = p.description || '';
  document.getElementById('p-images').value = typeof p.images==='string' ? p.images : JSON.stringify(p.images||[]);
  openModal('productModal');
}
document.getElementById('btnNewProduct').addEventListener('click', () => {
  editingProductId = null;
  document.getElementById('pmTitle').textContent = '新增商品';
  ['p-title','p-slug','p-price','p-original','p-stock','p-desc','p-images'].forEach(id => document.getElementById(id).value='');
  document.getElementById('p-category').value='bed';
  document.getElementById('p-pet').value='all';
  document.getElementById('p-status').value='active';
  openModal('productModal');
});
document.getElementById('btnSaveProduct').addEventListener('click', async () => {
  const payload = {
    action: editingProductId ? 'update' : 'create',
    id: editingProductId,
    title: document.getElementById('p-title').value,
    slug: document.getElementById('p-slug').value,
    price: document.getElementById('p-price').value,
    original_price: document.getElementById('p-original').value,
    category_id: document.getElementById('p-category').value,
    pet: document.getElementById('p-pet').value,
    stock: document.getElementById('p-stock').value,
    status: document.getElementById('p-status').value,
    description: document.getElementById('p-desc').value,
    images_json: document.getElementById('p-images').value
  };
  const r = await api('products.jsp', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
  if (r.code === 0) { closeModal('productModal'); loadProducts(pages.products); }
  else alert(r.msg || '保存失败');
});
async function delProduct(id) {
  if (!confirm('确认删除商品 #' + id + ' ?')) return;
  const r = await api(`products.jsp?id=${id}`, {method:'DELETE'});
  if (r.code === 0) loadProducts(pages.products);
  else alert(r.msg || '删除失败');
}

// Orders
async function loadOrders(page=1) {
  pages.orders = page;
  const status = document.getElementById('orderStatus').value;
  const d = await api(`orders.jsp?page=${page}&size=10${status?'&status='+status:''}`);
  if (d.code !== 0) return;
  const tbody = document.getElementById('orderList');
  tbody.innerHTML = d.data.items.map(o => `<tr>
    <td>${o.id}</td><td>${o.email}</td><td>$${o.total}</td>
    <td><span class="badge ${o.status}">${o.status}</span></td>
    <td>${o.created_at}</td>
    <td><button class="btn sm" onclick="viewOrder('${o.id}')">查看</button></td>
  </tr>`).join('') || '<tr><td colspan="6" class="empty">暂无订单</td></tr>';
  renderPag('orderPag', d.data.total, 10, pages.orders, loadOrders);
}
document.getElementById('orderStatus').addEventListener('change', () => loadOrders(1));
async function viewOrder(id) {
  const d = await api(`orders.jsp?id=${id}`);
  if (d.code !== 0) return;
  const o = d.data;
  const items = o.items.map(i => `<li>${i.title} x${i.qty} @ $${i.price}</li>`).join('');
  document.getElementById('orderDetail').innerHTML = `
    <p><b>订单号:</b> ${o.id}</p>
    <p><b>邮箱:</b> ${o.email}</p>
    <p><b>金额:</b> $${o.total} ${o.currency}</p>
    <p><b>状态:</b> <span class="badge ${o.status}">${o.status}</span></p>
    <p><b>下单时间:</b> ${o.created_at}</p>
    <p><b>商品:</b></p><ul>${items}</ul>
    <p><b>地址/原始数据:</b></p><pre style="background:#f5f6fa;padding:10px;border-radius:6px;overflow:auto">${JSON.stringify(o.address,null,2)}</pre>
    <div class="form-row" style="margin-top:12px">
      <div class="field"><label>更新状态</label>
        <select id="o-status">
          <option value="pending">pending</option>
          <option value="paid">paid</option>
          <option value="shipped">shipped</option>
          <option value="done">done</option>
          <option value="refund">refund</option>
        </select>
      </div>
      <div class="field"><label>备注</label><input type="text" id="o-note" value="${o.admin_note||''}"></div>
    </div>
    <button class="btn primary" onclick="updateOrder('${o.id}')">更新订单</button>
  `;
  document.getElementById('o-status').value = o.status;
  openModal('orderModal');
}
async function updateOrder(id) {
  const payload = {id, status: document.getElementById('o-status').value, admin_note: document.getElementById('o-note').value};
  const r = await api('orders.jsp', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
  if (r.code === 0) { closeModal('orderModal'); loadOrders(pages.orders); }
  else alert(r.msg || '更新失败');
}

// Subscribers
async function loadSubscribers(page=1) {
  pages.subscribers = page;
  const d = await api(`subscribers.jsp?page=${page}&size=15`);
  if (d.code !== 0) return;
  const tbody = document.getElementById('subList');
  tbody.innerHTML = d.data.items.map(s => `<tr><td>${s.id}</td><td>${s.email}</td><td>${s.created_at}</td></tr>`).join('') || '<tr><td colspan="3" class="empty">暂无订阅</td></tr>';
  renderPag('subPag', d.data.total, 15, pages.subscribers, loadSubscribers);
}

function renderPag(id, total, size, page, cb) {
  const max = Math.ceil(total / size);
  const el = document.getElementById(id);
  let html = `<button ${page<=1?'disabled':''} onclick="cb(${page-1})">上一页</button>`;
  html += `<span style="font-size:12px;color:#666;padding:6px 8px">${page} / ${max||1}</span>`;
  html += `<button ${page>=max?'disabled':''} onclick="cb(${page+1})">下一页</button>`;
  el.innerHTML = html;
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.getElementById('logout').addEventListener('click', async e => {
  e.preventDefault();
  await api('logout.jsp');
  location.href = 'login.html';
});

init();
</script>
</body>
</html>
