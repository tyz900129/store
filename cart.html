<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your cart · PawPatrol</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231F1A14'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='%23FAF6EE' font-family='serif' font-size='62' font-weight='700'%3EP%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/store/assets/css/base.css">
  <link rel="stylesheet" href="/store/assets/css/layout.css">
  <link rel="stylesheet" href="/store/assets/css/components.css">
  <link rel="stylesheet" href="/store/assets/css/pages.css">
</head>
<body data-page="cart">
  <header id="site-header" class="site-header"></header>

  <section class="page-title">
    <div class="container">
      <div class="crumbs">
        <a href="/store/">Home</a><span>/</span><span>Cart</span>
      </div>
      <h1>Your cart</h1>
      <p>Review your picks before checkout.</p>
    </div>
  </section>

  <main class="section">
    <div class="container">
      <div class="cart-page">
        <div>
          <div class="cart-table" id="cartTable"></div>
          <div id="cartEmpty" style="display:none;text-align:center;padding:80px 24px;background:#fff;border-radius:14px;">
            <div style="font-size:64px;margin-bottom:16px;">🛒</div>
            <h2 style="margin-bottom:8px;">Your cart is empty</h2>
            <p style="color:var(--c-ink-3);margin-bottom:24px;">Looks like you haven't added anything yet.</p>
            <a href="/store/products.html" class="btn btn-primary">Start shopping →</a>
          </div>
        </div>
        <div class="cart-summary" id="cartSummary"></div>
      </div>
    </div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script type="module" src="/store/assets/js/main.v5.js"></script>
  <script type="module" src="/store/assets/js/pages/cart.v5.js"></script>
</body>
</html>
